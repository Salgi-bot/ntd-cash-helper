<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NTD Helper">
<meta name="theme-color" content="#C4122F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>NTD Cash Helper | 대만 현금 도우미</title>
<style>
:root {
  --tw-red: #C4122F;
  --tw-blue: #002A6B;
  --tw-white: #FFFFFF;
  --bg: #F5F5F5;
  --card-bg: #FFFFFF;
  --card-shadow: 0 2px 8px rgba(0,0,0,0.08);
  --border: #E0E0E0;
  --text: #222222;
  --text-sub: #666666;
  --text-light: #999999;
  --accent: #C4122F;
  --accent-light: #FDEDEF;
  --success: #2E7D32;
  --success-light: #E8F5E9;
  --radius: 12px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: calc(70px + var(--safe-bottom));
  -webkit-font-smoothing: antialiased;
}

/* -- HEADER -- */
.header {
  background: linear-gradient(135deg, var(--tw-red), #A00E26);
  color: var(--tw-white);
  padding: 16px 20px;
  padding-top: calc(16px + env(safe-area-inset-top, 0px));
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.header .subtitle {
  font-size: 12px;
  opacity: 0.85;
  margin-top: 2px;
}
.rate-bar {
  background: rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 8px 12px;
  margin-top: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 13px;
}
.rate-bar .rate-value {
  font-weight: 700;
  font-size: 16px;
}
.rate-bar .rate-label {
  font-size: 11px;
  opacity: 0.8;
}
.rate-bar button {
  background: rgba(255,255,255,0.25);
  border: none;
  color: white;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.rate-bar button:active { background: rgba(255,255,255,0.4); }

/* -- TAB NAV -- */
.tab-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.tab-nav button {
  flex: 1;
  border: none;
  background: none;
  padding: 10px 4px 8px;
  font-size: 10px;
  color: var(--text-light);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.2s;
}
.tab-nav button.active {
  color: var(--accent);
}
.tab-nav button .tab-icon {
  font-size: 22px;
  line-height: 1;
}

/* -- CONTENT -- */
.content {
  padding: 16px;
  max-width: 480px;
  margin: 0 auto;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* -- CARD -- */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  padding: 16px;
  margin-bottom: 14px;
}
.card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--tw-blue);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title .icon { font-size: 16px; }

/* -- FORM -- */
.input-group {
  margin-bottom: 12px;
}
.input-group label {
  display: block;
  font-size: 12px;
  color: var(--text-sub);
  margin-bottom: 4px;
  font-weight: 600;
}
.input-group input, .input-group select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 16px;
  font-family: inherit;
  background: #FAFAFA;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.input-group input:focus, .input-group select:focus {
  border-color: var(--accent);
  outline: none;
  background: #FFF;
}
.input-row {
  display: flex;
  gap: 10px;
}
.input-row .input-group { flex: 1; }

/* -- BUTTONS -- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--accent);
  color: white;
  width: 100%;
}
.btn-primary:active { background: #A00E26; }
.btn-outline {
  background: transparent;
  color: var(--accent);
  border: 1.5px solid var(--accent);
}
.btn-outline:active { background: var(--accent-light); }
.btn-sm {
  padding: 6px 12px;
  font-size: 12px;
}
.btn-danger {
  background: #F5F5F5;
  color: #CC0000;
  border: none;
}

/* -- CONVERTER -- */
.converter-display {
  text-align: center;
  padding: 20px 0;
}
.converter-display .amount-ntd {
  font-size: 36px;
  font-weight: 800;
  color: var(--tw-red);
  line-height: 1.1;
}
.converter-display .amount-krw {
  font-size: 20px;
  font-weight: 600;
  color: var(--tw-blue);
  margin-top: 4px;
}
.converter-display .unit {
  font-size: 14px;
  font-weight: 400;
  opacity: 0.6;
}
.swap-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 8px auto;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: white;
  cursor: pointer;
  font-size: 18px;
  color: var(--text-sub);
  -webkit-tap-highlight-color: transparent;
}
.swap-btn:active { background: var(--bg); }

/* -- ORDER LIST -- */
.order-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid #F0F0F0;
}
.order-item:last-child { border-bottom: none; }
.order-info { flex: 1; min-width: 0; }
.order-name {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.order-price {
  font-size: 12px;
  color: var(--text-sub);
}
.order-krw-sub {
  font-size: 11px;
  color: var(--text-light);
}
.order-qty {
  display: flex;
  align-items: center;
  gap: 4px;
}
.order-qty button {
  width: 28px;
  height: 28px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: white;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.order-qty button:active { background: var(--bg); }
.order-qty .qty-num {
  width: 28px;
  text-align: center;
  font-weight: 700;
  font-size: 14px;
}
.order-subtotal {
  font-weight: 700;
  font-size: 14px;
  color: var(--tw-red);
  min-width: 70px;
  text-align: right;
}
.order-delete {
  width: 24px;
  height: 24px;
  border: none;
  background: none;
  color: #CCC;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.order-delete:active { color: #CC0000; }

/* -- TOTAL BAR -- */
.total-bar {
  background: var(--tw-blue);
  color: white;
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
}
.total-bar .total-label {
  font-size: 13px;
  opacity: 0.8;
}
.total-bar .total-amount {
  font-size: 22px;
  font-weight: 800;
}
.total-bar .total-krw {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 2px;
  text-align: right;
}

/* -- CURRENCY BILLS/COINS (Realistic Design) -- */
.bills-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 12px;
}
.bill-card {
  border-radius: 8px;
  padding: 14px 12px;
  position: relative;
  overflow: hidden;
  aspect-ratio: 2.5 / 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 65px;
}
.bill-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 8px,
    rgba(255,255,255,0.03) 8px,
    rgba(255,255,255,0.03) 9px
  );
  pointer-events: none;
}
.bill-card::after {
  content: '';
  position: absolute;
  top: 50%;
  right: 12px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
  transform: translateY(-50%);
  pointer-events: none;
}
.bill-top-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.bill-card .bill-denom {
  font-size: 20px;
  font-weight: 800;
  line-height: 1;
}
.bill-card .bill-ntd-mark {
  font-size: 9px;
  font-weight: 600;
  opacity: 0.7;
  letter-spacing: 0.5px;
}
.bill-bottom-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.bill-card .bill-figure {
  font-size: 9px;
  opacity: 0.75;
  font-weight: 500;
  max-width: 70%;
  line-height: 1.2;
}
.bill-card .bill-count-badge {
  background: rgba(0,0,0,0.35);
  color: white;
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}
.bill-card .bill-krw-tiny {
  font-size: 8px;
  opacity: 0.6;
  margin-top: 1px;
}
.bill-card .bill-rare {
  position: absolute;
  top: 4px;
  right: 4px;
  background: rgba(0,0,0,0.3);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 8px;
  font-weight: 600;
}

/* Bill realistic colors */
.bill-1000 {
  background: linear-gradient(135deg, #1B4F8A 0%, #2968B0 50%, #1B4F8A 100%);
  color: white;
  border: 1px solid rgba(255,255,255,0.15);
}
.bill-500 {
  background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #8B4513 100%);
  color: white;
  border: 1px solid rgba(255,255,255,0.15);
}
.bill-200 {
  background: linear-gradient(135deg, #2E7D32 0%, #388E3C 50%, #2E7D32 100%);
  color: white;
  border: 1px solid rgba(255,255,255,0.15);
}
.bill-100 {
  background: linear-gradient(135deg, #C62828 0%, #D32F2F 50%, #C62828 100%);
  color: white;
  border: 1px solid rgba(255,255,255,0.15);
}

.coins-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.coin-card {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), 0 2px 4px rgba(0,0,0,0.2);
}
.coin-card .coin-denom {
  font-size: 16px;
  font-weight: 800;
  line-height: 1;
}
.coin-card .coin-figure {
  font-size: 7px;
  opacity: 0.6;
  margin-top: 1px;
}
.coin-card .coin-unit {
  font-size: 8px;
  opacity: 0.7;
}
.coin-card .coin-count {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--accent);
  color: white;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}
.coin-card .coin-krw-tiny {
  position: absolute;
  bottom: -14px;
  font-size: 9px;
  color: var(--text-light);
  white-space: nowrap;
}
/* Coin colors */
.coin-50 {
  background: linear-gradient(160deg, #D4AF37, #FFD700, #D4AF37);
  color: #4A3800;
  border: 2.5px solid #C19A2E;
}
.coin-50::before {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  border: 1px dashed rgba(0,0,0,0.15);
  pointer-events: none;
}
.coin-10 {
  background: linear-gradient(160deg, #C0C0C0, #E0E0E0, #D0D0D0);
  color: #333;
  border: 2.5px solid #DAA520;
}
.coin-5 {
  background: linear-gradient(160deg, #CD7F32, #E8A850, #CD7F32);
  color: #3E2000;
  border: 2.5px solid #B8722E;
}
.coin-1 {
  background: linear-gradient(160deg, #C8C8C8, #E8E8E8, #D0D0D0);
  color: #444;
  border: 2px solid #A0A0A0;
}

.bill-card.zero, .coin-card.zero {
  opacity: 0.2;
}

/* -- INLINE BILLS SUMMARY (in order tab) -- */
.order-bills-summary {
  background: #F8F9FA;
  border-radius: 8px;
  padding: 10px 14px;
  margin-top: 10px;
  border: 1px solid #E8E8E8;
}
.order-bills-summary .obs-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--tw-blue);
  margin-bottom: 6px;
}
.obs-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.obs-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
}
.obs-chip.bill { background: rgba(0,42,107,0.1); color: var(--tw-blue); }
.obs-chip.coin { background: rgba(196,18,47,0.08); color: var(--accent); }
.obs-chip-icon {
  width: 14px;
  height: 8px;
  border-radius: 2px;
  display: inline-block;
}
.obs-chip-icon.coin-icon {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}
.obs-chip-icon.c1000 { background: #1B4F8A; }
.obs-chip-icon.c500 { background: #8B4513; }
.obs-chip-icon.c200 { background: #2E7D32; }
.obs-chip-icon.c100 { background: #C62828; }
.obs-chip-icon.c50 { background: #D4AF37; }
.obs-chip-icon.c10 { background: linear-gradient(#C0C0C0, #E0E0E0); border: 1px solid #DAA520; }
.obs-chip-icon.c5 { background: #CD7F32; }
.obs-chip-icon.c1 { background: #C0C0C0; }

/* -- PRESET CHIPS -- */
.preset-section {
  margin-bottom: 14px;
}
.preset-section .preset-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-sub);
  margin-bottom: 6px;
}
.preset-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.preset-chip {
  padding: 6px 12px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: white;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.preset-chip:active { background: var(--bg); border-color: var(--accent); }
.preset-chip .preset-name {
  font-size: 11px;
  color: var(--text-sub);
}
.preset-chip .preset-price {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
}
.preset-manage-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border: 1px dashed var(--border);
  border-radius: 20px;
  background: transparent;
  font-size: 11px;
  color: var(--text-light);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.preset-manage-btn:active { background: var(--bg); }

/* -- PRICE REFERENCE TABLE -- */
.collapsible {
  margin-top: 14px;
}
.collapsible-toggle {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  border: none;
  font-size: 13px;
  font-weight: 700;
  color: var(--tw-blue);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.collapsible-toggle .arrow {
  transition: transform 0.3s;
  font-size: 12px;
  color: var(--text-light);
}
.collapsible-toggle.open .arrow {
  transform: rotate(180deg);
}
.collapsible-body {
  display: none;
  background: var(--card-bg);
  border-radius: 0 0 var(--radius) var(--radius);
  box-shadow: var(--card-shadow);
  margin-top: -8px;
  padding: 8px 0;
}
.collapsible-body.open {
  display: block;
}
.ref-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.ref-table th {
  background: #F5F7FA;
  padding: 8px 12px;
  text-align: left;
  font-weight: 700;
  color: var(--tw-blue);
  font-size: 11px;
  border-bottom: 1px solid var(--border);
}
.ref-table th:nth-child(2),
.ref-table th:nth-child(3) {
  text-align: right;
}
.ref-table td {
  padding: 7px 12px;
  border-bottom: 1px solid #F5F5F5;
}
.ref-table td:nth-child(2),
.ref-table td:nth-child(3) {
  text-align: right;
  font-weight: 600;
}
.ref-table td:nth-child(3) {
  color: var(--text-light);
  font-size: 11px;
}
.ref-table tr:last-child td {
  border-bottom: none;
}
.ref-table tr:active {
  background: var(--accent-light);
}

/* -- CHANGE CALC -- */
.change-result {
  text-align: center;
  padding: 16px;
}
.change-result .change-amount {
  font-size: 28px;
  font-weight: 800;
  color: var(--success);
}
.change-result .change-krw {
  font-size: 14px;
  color: var(--text-sub);
}
.exact-badge {
  display: inline-block;
  background: var(--success-light);
  color: var(--success);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  margin-top: 8px;
}
.overpay-badge {
  display: inline-block;
  background: #FFF3E0;
  color: #E65100;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  margin-top: 8px;
}

/* -- QUICK AMOUNTS -- */
.quick-amounts {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.quick-amounts button {
  padding: 6px 12px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: white;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.quick-amounts button:active { background: var(--bg); }
.quick-amounts button.selected {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
}

/* -- EMPTY STATE -- */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-light);
}
.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.4;
}
.empty-state p {
  font-size: 13px;
  line-height: 1.5;
}

/* -- RATE MODAL -- */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-sheet {
  background: white;
  border-radius: 16px 16px 0 0;
  padding: 24px 20px;
  padding-bottom: calc(24px + var(--safe-bottom));
  width: 100%;
  max-width: 480px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-sheet h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
}
.modal-sheet .modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  border: none;
  background: none;
  font-size: 24px;
  color: var(--text-sub);
  cursor: pointer;
}

/* -- PRESET MODAL -- */
.preset-modal-body {
  max-height: 300px;
  overflow-y: auto;
}
.preset-modal-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid #F0F0F0;
}
.preset-modal-item:last-child { border-bottom: none; }
.preset-modal-item .pmi-name {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
}
.preset-modal-item .pmi-price {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
}
.preset-modal-item .pmi-del {
  width: 24px;
  height: 24px;
  border: none;
  background: none;
  color: #CCC;
  font-size: 18px;
  cursor: pointer;
}
.preset-modal-item .pmi-del:active { color: #CC0000; }
.preset-add-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.preset-add-row input {
  flex: 1;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
}

/* -- HISTORY -- */
.history-item {
  padding: 12px 0;
  border-bottom: 1px solid #F0F0F0;
}
.history-item:last-child { border-bottom: none; }
.history-time {
  font-size: 11px;
  color: var(--text-light);
}
.history-detail {
  font-size: 13px;
  margin-top: 2px;
}
.history-amount {
  font-weight: 700;
  color: var(--tw-red);
}

/* -- UTILITIES -- */
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.text-center { text-align: center; }
.text-sm { font-size: 12px; }
.text-sub { color: var(--text-sub); }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.divider { height: 1px; background: #F0F0F0; margin: 12px 0; }
.hidden { display: none !important; }

/* Haptic feedback simulation */
@media (hover: none) {
  button:active, .btn:active { transform: scale(0.97); }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>NTD Cash Helper</h1>
  <div class="subtitle">대만 현금 도우미</div>
  <div class="rate-bar">
    <div>
      <div class="rate-label">1 NTD =</div>
      <div class="rate-value" id="headerRate">-- KRW</div>
    </div>
    <button onclick="openRateModal()">환율 설정</button>
    <button onclick="fetchRate()" id="fetchBtn" title="실시간 환율">새로고침</button>
  </div>
</div>

<!-- TAB PANELS -->
<div class="content">

  <!-- TAB 1: 환율 변환 -->
  <div class="tab-panel active" id="panelConvert">
    <div class="card">
      <div class="card-title"><span class="icon">&#8361;</span> 환율 변환기</div>
      <div class="input-group">
        <label id="convertFromLabel">NTD (대만 달러)</label>
        <input type="number" id="convertFrom" inputmode="decimal" placeholder="금액 입력" oninput="convert()">
      </div>
      <div class="text-center">
        <button class="swap-btn" onclick="swapCurrency()" title="통화 전환">&#8645;</button>
      </div>
      <div class="converter-display">
        <div class="amount-ntd" id="convertResultTop">0 <span class="unit" id="convertUnitTop">NTD</span></div>
        <div class="amount-krw" id="convertResultBottom">= 0 <span class="unit" id="convertUnitBottom">KRW</span></div>
      </div>
      <div class="quick-amounts" id="quickConvert">
        <button onclick="quickConvertAmount(100)">100</button>
        <button onclick="quickConvertAmount(500)">500</button>
        <button onclick="quickConvertAmount(1000)">1,000</button>
        <button onclick="quickConvertAmount(5000)">5,000</button>
        <button onclick="quickConvertAmount(10000)">10,000</button>
      </div>
    </div>
  </div>

  <!-- TAB 2: 주문 합산 -->
  <div class="tab-panel" id="panelOrder">
    <!-- Preset chips -->
    <div class="card" id="presetCard">
      <div class="flex-between">
        <div class="card-title" style="margin-bottom:0"><span class="icon">&#9889;</span> 빠른 추가</div>
        <button class="preset-manage-btn" onclick="openPresetModal()">+ 편집</button>
      </div>
      <div class="preset-chips mt-8" id="presetChips"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">&#128722;</span> 주문 합산 계산기</div>
      <div class="input-row">
        <div class="input-group" style="flex:2">
          <label>품목명</label>
          <input type="text" id="itemName" placeholder="미입력 시 자동 번호">
        </div>
        <div class="input-group" style="flex:1">
          <label>가격 (NTD)</label>
          <input type="number" id="itemPrice" inputmode="decimal" placeholder="0" onkeydown="if(event.key==='Enter'){addItem()}">
        </div>
      </div>
      <button class="btn btn-primary" onclick="addItem()">+ 품목 추가</button>
    </div>

    <div class="card" id="orderListCard">
      <div class="flex-between">
        <div class="card-title" style="margin-bottom:0"><span class="icon">&#128203;</span> 주문 목록</div>
        <button class="btn btn-sm btn-danger" onclick="clearOrder()" id="clearOrderBtn" style="display:none">전체 삭제</button>
      </div>
      <div id="orderList">
        <div class="empty-state">
          <div class="empty-icon">&#128722;</div>
          <p>품목을 추가하면 여기에 표시됩니다</p>
        </div>
      </div>
      <div id="orderTotal" class="hidden">
        <div class="total-bar">
          <div>
            <div class="total-label">총 합계</div>
          </div>
          <div style="text-align:right">
            <div class="total-amount" id="orderTotalNTD">0 NTD</div>
            <div class="total-krw" id="orderTotalKRW">= 0 KRW</div>
          </div>
        </div>
        <div id="orderBillsSummary"></div>
      </div>
    </div>

    <!-- Price reference collapsible -->
    <div class="collapsible">
      <button class="collapsible-toggle" onclick="togglePriceRef(this)">
        <span>&#128200; 대만 물가 참고표</span>
        <span class="arrow">&#9660;</span>
      </button>
      <div class="collapsible-body" id="priceRefBody">
        <table class="ref-table">
          <thead>
            <tr><th>품목</th><th>NTD</th><th>원화</th></tr>
          </thead>
          <tbody id="priceRefRows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- TAB 3: 화폐 조합 -->
  <div class="tab-panel" id="panelBills">
    <div class="card">
      <div class="card-title"><span class="icon">&#128181;</span> 최적 화폐 조합</div>
      <div class="input-group">
        <label>금액 (NTD)</label>
        <input type="number" id="billAmount" inputmode="decimal" placeholder="지불할 금액 입력" oninput="calcBills()">
      </div>
      <div class="quick-amounts">
        <button onclick="quickBill(100)">100</button>
        <button onclick="quickBill(250)">250</button>
        <button onclick="quickBill(500)">500</button>
        <button onclick="quickBill(1000)">1,000</button>
        <button onclick="quickBill(1500)">1,500</button>
      </div>
    </div>

    <div class="card" id="billsResult" style="display:none">
      <div class="card-title"><span class="icon">&#127979;</span> 지폐</div>
      <div class="bills-grid" id="billsGrid"></div>
      <div class="divider"></div>
      <div class="card-title"><span class="icon">&#129689;</span> 동전</div>
      <div class="coins-row" id="coinsRow"></div>
      <div class="mt-12 text-center text-sm text-sub" id="billsKRW"></div>
    </div>
  </div>

  <!-- TAB 4: 거스름돈 -->
  <div class="tab-panel" id="panelChange">
    <div class="card">
      <div class="card-title"><span class="icon">&#128176;</span> 거스름돈 계산기</div>
      <div class="input-group">
        <label>구매 금액 (NTD)</label>
        <input type="number" id="purchaseAmount" inputmode="decimal" placeholder="물건 가격">
      </div>
      <div class="input-group">
        <label>지불 금액 (NTD)</label>
        <input type="number" id="payAmount" inputmode="decimal" placeholder="내는 금액">
      </div>
      <div class="quick-amounts" id="payQuick"></div>
      <button class="btn btn-primary mt-8" onclick="calcChange()">거스름돈 계산</button>
    </div>

    <div class="card" id="changeResult" style="display:none">
      <div class="change-result">
        <div id="changeBadge"></div>
        <div class="change-amount" id="changeAmountDisplay">0 NTD</div>
        <div class="change-krw" id="changeKRWDisplay">= 0 KRW</div>
      </div>
      <div class="divider"></div>
      <div class="card-title"><span class="icon">&#127979;</span> 거스름돈 화폐 조합</div>
      <div class="bills-grid" id="changeBillsGrid"></div>
      <div class="coins-row mt-8" id="changeCoinsRow"></div>
    </div>
  </div>

</div>

<!-- TAB NAV -->
<nav class="tab-nav">
  <button class="active" data-tab="panelConvert" onclick="switchTab(this)">
    <span class="tab-icon">&#8361;</span>
    환율
  </button>
  <button data-tab="panelOrder" onclick="switchTab(this)">
    <span class="tab-icon">&#128722;</span>
    주문
  </button>
  <button data-tab="panelBills" onclick="switchTab(this)">
    <span class="tab-icon">&#128181;</span>
    화폐
  </button>
  <button data-tab="panelChange" onclick="switchTab(this)">
    <span class="tab-icon">&#128176;</span>
    거스름
  </button>
</nav>

<!-- RATE MODAL -->
<div class="modal-overlay" id="rateModal" onclick="closeRateModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <h3>환율 설정</h3>
    <div class="input-group">
      <label>1 NTD = ? KRW</label>
      <input type="number" id="rateInput" inputmode="decimal" step="0.01" placeholder="예: 42.5">
    </div>
    <div class="text-sm text-sub mt-8">
      수동 입력하거나 "실시간 환율" 버튼으로 자동 업데이트
    </div>
    <div class="mt-12" style="display:flex;gap:10px">
      <button class="btn btn-outline" style="flex:1" onclick="closeRateModal()">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveRate()">저장</button>
    </div>
    <div class="mt-12">
      <button class="btn btn-primary" style="width:100%;background:var(--tw-blue)" onclick="fetchRate();closeRateModal()">실시간 환율 가져오기</button>
    </div>
    <div class="mt-8 text-sm text-sub" id="rateLastUpdate"></div>
  </div>
</div>

<!-- PRESET MODAL -->
<div class="modal-overlay" id="presetModal" onclick="closePresetModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <h3>프리셋 편집</h3>
    <div class="preset-modal-body" id="presetModalList"></div>
    <div class="preset-add-row">
      <input type="text" id="presetNewName" placeholder="품목명">
      <input type="number" id="presetNewPrice" inputmode="decimal" placeholder="NTD" style="max-width:80px">
      <button class="btn btn-sm btn-primary" style="width:auto;padding:8px 14px" onclick="addCustomPreset()">추가</button>
    </div>
    <div class="mt-12">
      <button class="btn btn-outline" style="width:100%" onclick="closePresetModal()">닫기</button>
    </div>
  </div>
</div>

<script>
// ======================================
// STATE
// ======================================
let rate = parseFloat(localStorage.getItem('ntd_rate')) || 0;
let rateSource = localStorage.getItem('ntd_rate_source') || '';
let rateTime = localStorage.getItem('ntd_rate_time') || '';
let convertDir = 'NTD_TO_KRW';
let orders = JSON.parse(localStorage.getItem('ntd_orders') || '[]');
let history = JSON.parse(localStorage.getItem('ntd_history') || '[]');
let itemCounter = parseInt(localStorage.getItem('ntd_item_counter') || '0');

const BILLS = [1000, 500, 200, 100];
const COINS = [50, 10, 5, 1];
const DENOMS = [...BILLS, ...COINS];

// Bill metadata
const BILL_META = {
  1000: { color: '#1B4F8A', figure: '지구본 교육', back: '꿩' },
  500:  { color: '#8B4513', figure: '소년야구팀', back: '매화사슴' },
  200:  { color: '#2E7D32', figure: '장개석 기념관', back: '대만 연어', rare: true },
  100:  { color: '#C62828', figure: '쑨원 초상', back: '중산루' }
};
const COIN_META = {
  50: { figure: '쑨원', desc: '황동, 톱니' },
  10: { figure: '장개석', desc: '바이메탈' },
  5:  { figure: '장개석', desc: '적동' },
  1:  { figure: '장개석', desc: '알루미늄' }
};

// Default presets
const DEFAULT_PRESETS = [
  { name: '버블티', price: 55 },
  { name: '지파이', price: 70 },
  { name: '샤오롱바오', price: 250 },
  { name: '루로우판', price: 50 },
  { name: '택시기본', price: 85 }
];
let presets = JSON.parse(localStorage.getItem('ntd_presets') || 'null') || [...DEFAULT_PRESETS];

// Price reference data
const PRICE_REF = [
  { item: 'MRT 기본요금', price: '20', ntd: 20 },
  { item: 'MRT 1일권', price: '180', ntd: 180 },
  { item: '택시 기본요금', price: '85', ntd: 85 },
  { item: '편의점 도시락', price: '60~80', ntd: 70 },
  { item: '버블티 (공차 등)', price: '45~65', ntd: 55 },
  { item: '샤오롱바오 (딘타이펑)', price: '250', ntd: 250 },
  { item: '지파이 (야시장)', price: '55~75', ntd: 65 },
  { item: '망고빙수', price: '120~180', ntd: 150 },
  { item: '루로우판', price: '40~60', ntd: 50 },
  { item: '우육면', price: '100~180', ntd: 140 },
  { item: '생맥주 500ml', price: '100~150', ntd: 125 },
  { item: '편의점 음료', price: '25~45', ntd: 35 }
];

// ======================================
// INIT
// ======================================
document.addEventListener('DOMContentLoaded', () => {
  updateRateDisplay();
  renderOrders();
  renderPresets();
  renderPriceRef();
  if (!rate) {
    fetchRate();
  }
});

// ======================================
// RATE
// ======================================
async function fetchRate() {
  const btn = document.getElementById('fetchBtn');
  btn.textContent = '...';
  btn.disabled = true;
  try {
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/TWD');
    const data = await res.json();
    if (data && data.rates && data.rates.KRW) {
      rate = Math.round(data.rates.KRW * 100) / 100;
      rateSource = 'ExchangeRate-API';
      rateTime = new Date().toLocaleString('ko-KR');
      saveRateToStorage();
      updateRateDisplay();
      renderPriceRef();
      renderOrders();
    }
  } catch (e) {
    try {
      const res2 = await fetch('https://open.er-api.com/v6/latest/TWD');
      const data2 = await res2.json();
      if (data2 && data2.rates && data2.rates.KRW) {
        rate = Math.round(data2.rates.KRW * 100) / 100;
        rateSource = 'open.er-api (fallback)';
        rateTime = new Date().toLocaleString('ko-KR');
        saveRateToStorage();
        updateRateDisplay();
        renderPriceRef();
        renderOrders();
      }
    } catch (e2) {
      if (!rate) {
        rate = 42.5;
        rateSource = '오프라인 기본값';
        rateTime = new Date().toLocaleString('ko-KR');
        saveRateToStorage();
        updateRateDisplay();
        renderPriceRef();
        renderOrders();
      }
      alert('환율 API 접속 실패. ' + (rate ? '캐시된 환율 사용 중.' : '기본값(42.5) 사용 중.'));
    }
  }
  btn.textContent = '새로고침';
  btn.disabled = false;
}

function saveRateToStorage() {
  localStorage.setItem('ntd_rate', rate);
  localStorage.setItem('ntd_rate_source', rateSource);
  localStorage.setItem('ntd_rate_time', rateTime);
}

function updateRateDisplay() {
  document.getElementById('headerRate').textContent = rate ? (rate.toFixed(2) + ' KRW') : '-- KRW';
  const lastUpdate = document.getElementById('rateLastUpdate');
  if (rateTime) {
    lastUpdate.textContent = '마지막 업데이트: ' + rateTime + ' (' + rateSource + ')';
  }
}

function openRateModal() {
  document.getElementById('rateInput').value = rate || '';
  document.getElementById('rateModal').classList.add('show');
}

function closeRateModal(e) {
  if (e && e.target !== document.getElementById('rateModal')) return;
  document.getElementById('rateModal').classList.remove('show');
}

function saveRate() {
  const v = parseFloat(document.getElementById('rateInput').value);
  if (!v || v <= 0) { alert('올바른 환율을 입력하세요'); return; }
  rate = v;
  rateSource = '수동 입력';
  rateTime = new Date().toLocaleString('ko-KR');
  saveRateToStorage();
  updateRateDisplay();
  convert();
  renderPriceRef();
  renderOrders();
  closeRateModal();
}

function ntdToKrw(ntd) { return Math.round(ntd * rate); }
function krwToNtd(krw) { return rate > 0 ? Math.round(krw / rate) : 0; }
function fmt(n) { return n.toLocaleString('ko-KR'); }
function fmtKrw(ntd) { return rate > 0 ? '(' + String.fromCharCode(8776) + ' ' + String.fromCharCode(8361) + fmt(ntdToKrw(ntd)) + ')' : ''; }

// ======================================
// TAB 1: CONVERTER
// ======================================
function convert() {
  const input = parseFloat(document.getElementById('convertFrom').value) || 0;
  const topEl = document.getElementById('convertResultTop');
  const bottomEl = document.getElementById('convertResultBottom');

  if (convertDir === 'NTD_TO_KRW') {
    topEl.innerHTML = fmt(input) + ' <span class="unit">NTD</span>';
    bottomEl.innerHTML = '= ' + fmt(ntdToKrw(input)) + ' <span class="unit">KRW</span>';
  } else {
    topEl.innerHTML = fmt(input) + ' <span class="unit">KRW</span>';
    bottomEl.innerHTML = '= ' + fmt(krwToNtd(input)) + ' <span class="unit">NTD</span>';
  }
}

function swapCurrency() {
  convertDir = convertDir === 'NTD_TO_KRW' ? 'KRW_TO_NTD' : 'NTD_TO_KRW';
  const label = document.getElementById('convertFromLabel');
  label.textContent = convertDir === 'NTD_TO_KRW' ? 'NTD (대만 달러)' : 'KRW (한국 원)';
  convert();
}

function quickConvertAmount(n) {
  document.getElementById('convertFrom').value = n;
  convert();
}

// ======================================
// TAB 2: ORDER
// ======================================
function addItem() {
  const nameEl = document.getElementById('itemName');
  const priceEl = document.getElementById('itemPrice');
  let name = nameEl.value.trim();
  const price = parseFloat(priceEl.value);

  if (!price || price <= 0) { priceEl.focus(); return; }

  // Auto-name if empty
  if (!name) {
    itemCounter++;
    name = '품목 ' + itemCounter;
    localStorage.setItem('ntd_item_counter', itemCounter);
  }

  orders.push({ name, price, qty: 1, id: Date.now() });
  saveOrders();
  renderOrders();
  nameEl.value = '';
  priceEl.value = '';
  nameEl.focus();
}

function addPresetItem(name, price) {
  orders.push({ name, price, qty: 1, id: Date.now() });
  saveOrders();
  renderOrders();
}

function removeItem(id) {
  orders = orders.filter(o => o.id !== id);
  saveOrders();
  renderOrders();
}

function changeQty(id, delta) {
  const item = orders.find(o => o.id === id);
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  saveOrders();
  renderOrders();
}

function clearOrder() {
  if (!confirm('주문 목록을 전체 삭제하시겠습니까?')) return;
  orders = [];
  saveOrders();
  renderOrders();
}

function saveOrders() {
  localStorage.setItem('ntd_orders', JSON.stringify(orders));
}

function renderOrders() {
  const list = document.getElementById('orderList');
  const totalEl = document.getElementById('orderTotal');
  const clearBtn = document.getElementById('clearOrderBtn');

  if (orders.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128722;</div><p>품목을 추가하면 여기에 표시됩니다</p></div>';
    totalEl.classList.add('hidden');
    clearBtn.style.display = 'none';
    return;
  }

  clearBtn.style.display = '';
  let html = '';
  let total = 0;

  orders.forEach(o => {
    const sub = o.price * o.qty;
    total += sub;
    html += `
      <div class="order-item">
        <div class="order-info">
          <div class="order-name">${escHtml(o.name)}</div>
          <div class="order-price">${fmt(o.price)} NTD <span class="order-krw-sub">${fmtKrw(o.price)}</span></div>
        </div>
        <div class="order-qty">
          <button onclick="changeQty(${o.id},-1)">-</button>
          <span class="qty-num">${o.qty}</span>
          <button onclick="changeQty(${o.id},1)">+</button>
        </div>
        <div class="order-subtotal">${fmt(sub)}<br><span class="order-krw-sub">${fmtKrw(sub)}</span></div>
        <button class="order-delete" onclick="removeItem(${o.id})" title="삭제">&#215;</button>
      </div>`;
  });

  list.innerHTML = html;
  totalEl.classList.remove('hidden');
  document.getElementById('orderTotalNTD').textContent = fmt(total) + ' NTD';
  document.getElementById('orderTotalKRW').textContent = '= ' + fmt(ntdToKrw(total)) + ' KRW';

  // Render inline bills summary
  renderOrderBillsSummary(total);

  // Auto-fill change calc purchase amount
  document.getElementById('purchaseAmount').value = total;
  suggestPayAmounts(total);
}

function renderOrderBillsSummary(total) {
  const el = document.getElementById('orderBillsSummary');
  if (total <= 0) { el.innerHTML = ''; return; }

  const bd = getBillBreakdown(total);
  let chips = '';
  DENOMS.forEach(d => {
    if (bd[d] > 0) {
      const isBill = BILLS.includes(d);
      const iconCls = isBill ? '' : 'coin-icon';
      chips += `<span class="obs-chip ${isBill ? 'bill' : 'coin'}"><span class="obs-chip-icon ${iconCls} c${d}"></span>${fmt(d)}x${bd[d]}${isBill ? '장' : '개'}</span>`;
    }
  });

  el.innerHTML = `<div class="order-bills-summary"><div class="obs-title">필요 화폐 조합</div><div class="obs-chips">${chips}</div></div>`;
}

// ======================================
// PRESETS
// ======================================
function renderPresets() {
  const el = document.getElementById('presetChips');
  el.innerHTML = presets.map((p, i) =>
    `<button class="preset-chip" onclick="addPresetItem('${escHtml(p.name)}',${p.price})">
      <span class="preset-name">${escHtml(p.name)}</span>
      <span class="preset-price">${fmt(p.price)}</span>
    </button>`
  ).join('');
}

function openPresetModal() {
  renderPresetModalList();
  document.getElementById('presetModal').classList.add('show');
}

function closePresetModal(e) {
  if (e && e.target !== document.getElementById('presetModal')) return;
  document.getElementById('presetModal').classList.remove('show');
}

function renderPresetModalList() {
  const el = document.getElementById('presetModalList');
  if (presets.length === 0) {
    el.innerHTML = '<div class="text-center text-sub text-sm" style="padding:20px">프리셋이 없습니다</div>';
    return;
  }
  el.innerHTML = presets.map((p, i) =>
    `<div class="preset-modal-item">
      <span class="pmi-name">${escHtml(p.name)}</span>
      <span class="pmi-price">${fmt(p.price)} NTD</span>
      <button class="pmi-del" onclick="removePreset(${i})" title="삭제">&#215;</button>
    </div>`
  ).join('');
}

function removePreset(idx) {
  presets.splice(idx, 1);
  localStorage.setItem('ntd_presets', JSON.stringify(presets));
  renderPresetModalList();
  renderPresets();
}

function addCustomPreset() {
  const nameEl = document.getElementById('presetNewName');
  const priceEl = document.getElementById('presetNewPrice');
  const name = nameEl.value.trim();
  const price = parseFloat(priceEl.value);
  if (!name || !price || price <= 0) return;
  presets.push({ name, price });
  localStorage.setItem('ntd_presets', JSON.stringify(presets));
  nameEl.value = '';
  priceEl.value = '';
  renderPresetModalList();
  renderPresets();
}

// ======================================
// PRICE REFERENCE TABLE
// ======================================
function renderPriceRef() {
  const tbody = document.getElementById('priceRefRows');
  tbody.innerHTML = PRICE_REF.map(r =>
    `<tr onclick="addPresetItem('${escHtml(r.item)}',${r.ntd})">
      <td>${r.item}</td>
      <td>${r.price}</td>
      <td>${rate > 0 ? (String.fromCharCode(8361) + fmt(ntdToKrw(r.ntd))) : '-'}</td>
    </tr>`
  ).join('');
}

function togglePriceRef(btn) {
  btn.classList.toggle('open');
  document.getElementById('priceRefBody').classList.toggle('open');
}

// ======================================
// TAB 3: BILLS
// ======================================
function calcBills() {
  const amount = parseInt(document.getElementById('billAmount').value) || 0;
  const resultEl = document.getElementById('billsResult');
  if (amount <= 0) { resultEl.style.display = 'none'; return; }
  resultEl.style.display = '';

  const breakdown = getBillBreakdown(amount);
  renderBillBreakdown(breakdown, 'billsGrid', 'coinsRow');

  document.getElementById('billsKRW').textContent =
    '= ' + fmt(ntdToKrw(amount)) + ' KRW (' + String.fromCharCode(8776) + ' ' + fmt(Math.round(ntdToKrw(amount) / 1000) * 1000) + '원)';
}

function quickBill(n) {
  document.getElementById('billAmount').value = n;
  calcBills();
}

function getBillBreakdown(amount) {
  let remaining = amount;
  const result = {};
  DENOMS.forEach(d => {
    result[d] = Math.floor(remaining / d);
    remaining = remaining % d;
  });
  return result;
}

function renderBillBreakdown(breakdown, billsId, coinsId) {
  const billsEl = document.getElementById(billsId);
  const coinsEl = document.getElementById(coinsId);

  billsEl.innerHTML = BILLS.map(d => {
    const meta = BILL_META[d];
    const zeroClass = breakdown[d] === 0 ? 'zero' : '';
    return `
    <div class="bill-card bill-${d} ${zeroClass}">
      <div class="bill-top-row">
        <div>
          <div class="bill-denom">${fmt(d)}</div>
          <div class="bill-ntd-mark">NT$</div>
        </div>
        <div class="bill-count-badge">${breakdown[d]}장</div>
      </div>
      <div class="bill-bottom-row">
        <div class="bill-figure">${meta.figure} / ${meta.back}</div>
        <div class="bill-krw-tiny">${fmtKrw(d)}</div>
      </div>
      ${meta.rare ? '<div class="bill-rare">희귀</div>' : ''}
    </div>`;
  }).join('');

  coinsEl.innerHTML = COINS.map(d => {
    const meta = COIN_META[d];
    const zeroClass = breakdown[d] === 0 ? 'zero' : '';
    return `
    <div class="coin-card coin-${d} ${zeroClass}">
      <div class="coin-denom">${d}</div>
      <div class="coin-figure">${meta.figure}</div>
      ${breakdown[d] > 0 ? `<div class="coin-count">${breakdown[d]}</div>` : ''}
      <div class="coin-krw-tiny">${fmtKrw(d)}</div>
    </div>`;
  }).join('');
}

// ======================================
// TAB 4: CHANGE
// ======================================
function suggestPayAmounts(purchaseAmount) {
  const quick = document.getElementById('payQuick');
  if (!purchaseAmount || purchaseAmount <= 0) { quick.innerHTML = ''; return; }

  const suggestions = [];
  const r100 = Math.ceil(purchaseAmount / 100) * 100;
  if (r100 > purchaseAmount) suggestions.push(r100);
  const r500 = Math.ceil(purchaseAmount / 500) * 500;
  if (r500 > purchaseAmount && !suggestions.includes(r500)) suggestions.push(r500);
  const r1000 = Math.ceil(purchaseAmount / 1000) * 1000;
  if (r1000 > purchaseAmount && !suggestions.includes(r1000)) suggestions.push(r1000);
  if (!suggestions.includes(purchaseAmount)) suggestions.unshift(purchaseAmount);

  quick.innerHTML = suggestions.map(s =>
    `<button onclick="document.getElementById('payAmount').value=${s};calcChange()">${fmt(s)} NTD</button>`
  ).join('');
}

function calcChange() {
  const purchase = parseInt(document.getElementById('purchaseAmount').value) || 0;
  const pay = parseInt(document.getElementById('payAmount').value) || 0;
  const resultEl = document.getElementById('changeResult');

  if (purchase <= 0 || pay <= 0) { resultEl.style.display = 'none'; return; }

  resultEl.style.display = '';
  const change = pay - purchase;
  const badgeEl = document.getElementById('changeBadge');

  if (change < 0) {
    document.getElementById('changeAmountDisplay').textContent = fmt(Math.abs(change)) + ' NTD 부족';
    document.getElementById('changeAmountDisplay').style.color = '#CC0000';
    document.getElementById('changeKRWDisplay').textContent = fmtKrw(Math.abs(change));
    badgeEl.innerHTML = '<span class="overpay-badge">금액 부족</span>';
    document.getElementById('changeBillsGrid').innerHTML = '';
    document.getElementById('changeCoinsRow').innerHTML = '';
    return;
  }

  document.getElementById('changeAmountDisplay').style.color = 'var(--success)';

  if (change === 0) {
    document.getElementById('changeAmountDisplay').textContent = '딱 맞음!';
    document.getElementById('changeKRWDisplay').textContent = '';
    badgeEl.innerHTML = '<span class="exact-badge">정확한 금액</span>';
    document.getElementById('changeBillsGrid').innerHTML = '';
    document.getElementById('changeCoinsRow').innerHTML = '';
    return;
  }

  document.getElementById('changeAmountDisplay').textContent = fmt(change) + ' NTD';
  document.getElementById('changeKRWDisplay').textContent = '= ' + fmt(ntdToKrw(change)) + ' KRW ' + fmtKrw(change);
  badgeEl.innerHTML = '<span class="overpay-badge">거스름돈</span>';

  const breakdown = getBillBreakdown(change);
  renderBillBreakdown(breakdown, 'changeBillsGrid', 'changeCoinsRow');

  addHistory(purchase, pay, change);
}

// ======================================
// HISTORY
// ======================================
function addHistory(purchase, pay, change) {
  history.unshift({
    time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
    purchase, pay, change
  });
  if (history.length > 20) history.pop();
  localStorage.setItem('ntd_history', JSON.stringify(history));
}

// ======================================
// TAB SWITCH
// ======================================
function switchTab(btn) {
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(btn.dataset.tab).classList.add('active');

  if (btn.dataset.tab === 'panelChange' && orders.length > 0) {
    const total = orders.reduce((s, o) => s + o.price * o.qty, 0);
    document.getElementById('purchaseAmount').value = total;
    suggestPayAmounts(total);
  }

  if (btn.dataset.tab === 'panelBills' && orders.length > 0) {
    const total = orders.reduce((s, o) => s + o.price * o.qty, 0);
    document.getElementById('billAmount').value = total;
    calcBills();
  }
}

// ======================================
// UTILS
// ======================================
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ======================================
// SERVICE WORKER
// ======================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
